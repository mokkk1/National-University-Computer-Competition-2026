name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install TA-Lib system library
        run: |
          sudo apt-get update
          sudo apt-get install -y ta-lib

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install torch numpy pandas scikit-learn ta-lib joblib tqdm tensorboardx

      - name: Run unit tests
        run: |
          python -m pytest tests/test_labels.py tests/test_loss.py tests/test_market_gate.py tests/test_model.py tests/test_utils.py -v

      - name: Run integration smoke test
        run: |
          python -m pytest tests/test_integration.py -v
